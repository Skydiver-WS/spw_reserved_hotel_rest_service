server:
  port: 8443
  ssl:
    key-store-type: PKCS12
    key-store: classpath:cert/keystore.p12
    key-store-password: ${CERTIFICATE_PASSWORD}
    key-alias: rest-app-hotel
    enabled: ${CERTIFICATE_ENABLED}
spring:
  application:
    name: reserved_hotel_rest_service
  # Настройки Actuator
  data:
    redis:
      #      host: host.docker.internal
      #      port: 31033
      ##      port: 6379
      #      timeLiveMessages: 10m
      host: ${REDIS_URL}
      port: ${REDIS_PORT}
      timeLiveMessages: ${REDIS_TIME_LIVE_MESSAGES}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  ai:
    openai:
      api-key: "stub-key"
  task:
    scheduling:
      pool:
        size: 2

db:
  service:
    #    data:
    #     host: http://host.docker.internal:8081/booking-app
    #    auth:
    #      host: http://host.docker.internal:8084/auth-db-app
    data:
      host: ${APP_HOTEL_DB}
    auth:
      host: ${APP_AUTH_DB}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      access: read_only
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}
  server:
    port: ${server.port}  # Actuator порт (можно оставить тот же)
token:
  signing:
    key: ${SPRING_SECURITY_KEY}
    expiration: ${SPRING_SECURITY_EXPIRATION}
    levelCrypto: ${SPRING_SECURITY_LEVEL_CRYPTO}
giga-chat:
  property:
#    model: "GigaChat-2"
#    host: 'https://ngw.devices.sberbank.ru:9443/api/v2/oauth'
#    auth-token: ${GIGA_CHAT_AUTH_KEY}
#    get-models-url: 'https://gigachat.devices.sberbank.ru/api/v1/models'
#    create-promt: 'https://gigachat.devices.sberbank.ru/api'
#    url-promt: '/v1/chat/completions'
#    cookie-live: 10m
    model: ${GIGA_CHAT_MODEL}
    host: ${GIGA_CHAT_HOST}
    auth-token: ${GIGA_CHAT_AUTH_KEY}
    get-models-url: 'https://gigachat.devices.sberbank.ru/api/v1/models'
    create-promt: ${GIGA_CHAT_CREATE_PROMT}
    url-promt: ${GIGA_CHAT_URL_PROMT}
    cookie-live: ${GIGA_CHAT_COOKIE_LIVE}
scheduler:
  update-token: "0 */30 * * * *"


